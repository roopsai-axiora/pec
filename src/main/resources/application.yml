spring:
  application:
    name: pec

  datasource:
    url: jdbc:postgresql://localhost:5433/pec_db
    username: pec_admin
    password: pec_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

logging:
  level:
    com.axiora.pec: DEBUG

pec:
  jwt:
    secret: 3f8c2a1d9e4b7f6a2c5d8e1f4a7b0c3d6e9f2a5b8c1d4e7f0a3b6c9d2e5f8a1
    expiration-ms: 86400000