spring:
  application:
    name: pec

  datasource:
    url: jdbc:postgresql://localhost:5433/pec_db
    username: pec_admin
    password: pec_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

logging:
  level:
    com.axiora.pec: DEBUG